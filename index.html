<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia's Apps 🌈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", sans-serif;
    background: linear-gradient(160deg, #ffd6e8 0%, #c8e7ff 50%, #d8ffd6 100%);
    display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 32px 16px;
  }
  h1 { color: #ff5da2; text-shadow: 2px 2px 0 #fff; font-size: 2rem; text-align: center; }
  a.app {
    display: flex; align-items: center; gap: 16px; width: 100%; max-width: 480px;
    background: #fff; border-radius: 24px; padding: 20px 24px; text-decoration: none;
    color: #333; font-size: 1.3rem; box-shadow: 0 8px 0 rgba(0,0,0,.08); transition: transform .1s;
  }
  a.app:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.08); }
  a.app .emoji { font-size: 2.6rem; }
</style>
</head>
<body>
  <h1>🌈 Sofia's Apps 🌈</h1>
  <a class="app" href="dog-presentation/"><span class="emoji">🐶</span> My Dog Presentation</a>
</body>
</html>
