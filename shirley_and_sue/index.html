<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sue & Shirley — Learn the Story</title>
    <style>
      :root {
        --bg-1: #fef6e4;
        --bg-2: #f3d2c1;
        --bg-3: #cde7f0;
        --ink: #001858;
        --ink-soft: #172c66;
        --pink: #f582ae;
        --pink-deep: #e26d99;
        --teal: #8bd3dd;
        --teal-deep: #5cbcc7;
        --gold: #ffc15e;
        --green: #b8e0d2;
        --green-deep: #6fb39a;
        --card: #fffdfa;
        --shadow: 0 14px 40px -18px rgba(0, 24, 88, 0.35);
        --radius: 22px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: "Nunito", "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1100px 600px at 8% -5%, #ffe1ec 0%, transparent 60%),
          radial-gradient(900px 500px at 100% 10%, #d5ecff 0%, transparent 55%),
          radial-gradient(700px 500px at 50% 110%, #fff2c2 0%, transparent 55%),
          linear-gradient(180deg, var(--bg-1), #fff8ee 50%, var(--bg-3));
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
      }
      .app {
        max-width: 920px;
        margin: 0 auto;
        padding: clamp(16px, 3vw, 36px) clamp(14px, 3vw, 28px) 60px;
      }
      header.hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }
      header.hero h1 {
        font-size: clamp(1.6rem, 3.6vw, 2.4rem);
        margin: 0;
        letter-spacing: -0.02em;
      }
      header.hero p {
        margin: 4px 0 0;
        color: var(--ink-soft);
        font-weight: 600;
        opacity: 0.8;
      }
      .stars {
        display: flex;
        gap: 6px;
        background: var(--card);
        padding: 10px 14px;
        border-radius: 999px;
        box-shadow: var(--shadow);
        font-weight: 800;
      }
      .stars .star { color: #d8d3c8; transition: transform 0.25s ease, color 0.25s ease; }
      .stars .star.on { color: var(--gold); transform: scale(1.15); }
      nav.tabs {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
        background: var(--card);
        padding: 8px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        margin-bottom: 22px;
        position: sticky;
        top: 10px;
        z-index: 20;
      }
      nav.tabs button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--ink-soft);
        font-weight: 800;
        font-size: 0.95rem;
        padding: 12px 8px;
        border-radius: 14px;
        cursor: pointer;
        transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
        font-family: inherit;
      }
      nav.tabs button:hover { background: #fff1e6; }
      nav.tabs button.active {
        background: linear-gradient(135deg, var(--pink), var(--gold));
        color: #fff;
        box-shadow: 0 8px 20px -8px rgba(245, 130, 174, 0.6);
      }
      nav.tabs button .ico { display: block; font-size: 1.4rem; line-height: 1; margin-bottom: 4px; }
      .panel {
        background: var(--card);
        border-radius: var(--radius);
        padding: clamp(18px, 3vw, 30px);
        box-shadow: var(--shadow);
        animation: pop 0.35s ease;
      }
      @keyframes pop {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      h2 { margin: 0 0 6px; font-size: 1.4rem; }
      .lede { color: var(--ink-soft); margin: 0 0 18px; font-weight: 600; }
      .scenes { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; }
      .scene {
        position: relative;
        border-radius: 18px;
        padding: 14px 14px 16px;
        background: linear-gradient(160deg, #fff, #fff7ec);
        border: 2px solid #ffe1c2;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }
      .scene:hover { transform: translateY(-3px); box-shadow: 0 14px 26px -16px rgba(0,24,88,0.3); }
      .scene.playing { border-color: var(--pink); box-shadow: 0 10px 22px -10px rgba(245,130,174,0.6); }
      .scene .emoji { font-size: 2.2rem; line-height: 1; }
      .scene .num {
        position: absolute; top: 10px; right: 12px; font-weight: 900; opacity: 0.35;
      }
      .scene p { margin: 8px 0 0; font-size: 0.98rem; line-height: 1.4; font-weight: 600; }
      .scene .sh { color: var(--pink-deep); }
      .scene .ss { color: var(--teal-deep); }
      .legend {
        display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
        background: #fff8ee; border: 1px dashed #f3d2c1; border-radius: 14px;
        padding: 12px 14px; margin: 18px 0 8px; font-weight: 700;
      }
      .legend b { padding: 2px 8px; border-radius: 8px; }
      .legend .sh { background: #ffd9e7; color: var(--pink-deep); }
      .legend .ss { background: #d5f0f4; color: var(--teal-deep); }
      .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
      .btn {
        appearance: none; border: 0; cursor: pointer; font-family: inherit;
        font-weight: 800; font-size: 1rem;
        padding: 12px 18px; border-radius: 999px;
        transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        display: inline-flex; align-items: center; gap: 8px;
      }
      .btn:active { transform: translateY(1px); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn.primary { background: linear-gradient(135deg, var(--pink), var(--gold)); color: #fff; box-shadow: 0 12px 22px -10px rgba(245,130,174,0.55); }
      .btn.teal { background: linear-gradient(135deg, var(--teal), var(--green)); color: var(--ink); box-shadow: 0 12px 22px -12px rgba(92,188,199,0.55); }
      .btn.ghost { background: #fff; color: var(--ink-soft); border: 2px solid #ffe1c2; }
      .btn.danger { background: #ffd1d1; color: #b21f4a; }
      .pill { font-weight: 800; padding: 6px 12px; border-radius: 999px; background: #fff1e6; color: var(--ink-soft); font-size: 0.9rem; }
      .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
      .slider-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .slider-row label { font-weight: 700; color: var(--ink-soft); }
      input[type="range"] { accent-color: var(--pink); }
      .blank-line {
        font-size: 1.15rem; line-height: 1.9; font-weight: 600;
        margin: 8px 0; padding: 10px 14px; border-radius: 14px;
        background: #fff8ee; border: 1px solid #ffe1c2;
      }
      .blank {
        display: inline-block; min-width: 50px; padding: 0 8px;
        border-bottom: 3px solid var(--pink);
        color: transparent; user-select: none;
        transition: color 0.3s ease, background 0.3s ease;
      }
      .blank.show { color: var(--pink-deep); background: #ffe9f1; border-radius: 6px; }
      .word-pool { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      .word-pool button {
        appearance: none; border: 0; cursor: pointer;
        background: #fff; border: 2px solid #cde7f0;
        font-family: inherit; font-weight: 700;
        padding: 8px 14px; border-radius: 12px;
        transition: transform 0.15s ease, background 0.2s ease;
      }
      .word-pool button:hover { background: #e8f6fa; transform: translateY(-1px); }
      .word-pool button.used { opacity: 0.3; pointer-events: none; }
      .recital {
        font-size: 1.1rem; line-height: 1.85; font-weight: 600;
        background: #fff8ee; border-radius: 16px; padding: 16px 20px;
        border: 1px solid #ffe1c2;
      }
      .recital .word { transition: background 0.2s ease, color 0.2s ease; padding: 1px 3px; border-radius: 4px; }
      .recital .word.matched { background: #d8f3dc; color: #1b4332; }
      .recital .word.missed { background: #ffd6d6; color: #9d0208; }
      .recital .word.current { background: #ffe69b; color: var(--ink); }
      .feedback {
        margin-top: 14px; padding: 12px 16px; border-radius: 14px;
        background: #f1f7ff; border: 1px solid #d5ecff; font-weight: 700; color: var(--ink-soft);
        min-height: 24px;
      }
      .feedback.success { background: #e6f7ec; border-color: #b8e0d2; color: #1b4332; }
      .feedback.warn { background: #fff3cd; border-color: #ffe69b; color: #7a5a00; }
      .feedback.error { background: #ffd6d6; border-color: #ffb4b4; color: #9d0208; }
      .progress-track {
        height: 12px; background: #ffe1c2; border-radius: 999px; overflow: hidden;
        margin-top: 10px;
      }
      .progress-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, var(--pink), var(--gold));
        transition: width 0.4s ease;
      }
      .step-pill {
        display: inline-flex; align-items: center; gap: 6px;
        background: #fff1e6; padding: 6px 12px; border-radius: 999px; font-weight: 800;
      }
      .game-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; min-height: 80px; padding: 12px;
        background: #fff8ee; border: 2px dashed #ffe1c2; border-radius: 14px; }
      .chip {
        appearance: none; border: 0; cursor: grab;
        background: #fff; border: 2px solid #f3d2c1;
        padding: 8px 14px; border-radius: 12px; font-weight: 700; font-family: inherit;
        transition: transform 0.15s ease;
      }
      .chip:hover { transform: translateY(-1px); }
      .chip.placed { background: #d5f0f4; border-color: var(--teal-deep); color: var(--teal-deep); }
      .chip.correct { background: #d8f3dc; border-color: var(--green-deep); color: #1b4332; }
      .chip.wrong { background: #ffd6d6; border-color: #ffb4b4; color: #9d0208; }
      .tip {
        background: linear-gradient(160deg, #fff, #f1f7ff);
        border: 1px solid #d5ecff;
        border-radius: 16px;
        padding: 14px 16px;
        margin: 16px 0 0;
        font-weight: 600;
        color: var(--ink-soft);
      }
      .tip b { color: var(--ink); }
      .scene-detail {
        margin-top: 14px; padding: 14px 16px;
        border-radius: 14px;
        background: #fff8ee; border: 1px solid #ffe1c2;
        font-size: 1.05rem; font-weight: 600; line-height: 1.6;
      }
      .mini-mute {
        appearance: none; border: 0; cursor: pointer;
        background: #fff; border: 2px solid #ffe1c2;
        padding: 6px 10px; border-radius: 10px; font-weight: 800; font-family: inherit;
      }
      details { background: #fff8ee; border: 1px solid #ffe1c2; border-radius: 14px; padding: 10px 14px; margin-top: 14px; }
      details summary { cursor: pointer; font-weight: 800; }
      details ul { margin: 8px 0 0; padding-left: 20px; }
      details li { margin: 4px 0; font-weight: 600; color: var(--ink-soft); }
      @media (max-width: 540px) {
        nav.tabs { grid-template-columns: repeat(3, 1fr); }
        nav.tabs button { font-size: 0.72rem; padding: 10px 4px; }
        nav.tabs button .ico { font-size: 1.2rem; }
        header.hero { flex-direction: column; align-items: flex-start; }
      }

      /* Karaoke styles */
      .karaoke-stage {
        position: relative;
        background: linear-gradient(160deg, #001858 0%, #2a1a5e 60%, #4a1d6e 100%);
        border-radius: 22px;
        padding: clamp(20px, 4vw, 38px) clamp(18px, 3vw, 30px);
        color: #fff;
        overflow: hidden;
        box-shadow: 0 20px 50px -20px rgba(0, 24, 88, 0.6);
        margin-top: 16px;
      }
      .karaoke-stage::before {
        content: "";
        position: absolute; inset: 0;
        background:
          radial-gradient(400px 200px at 20% 0%, rgba(245, 130, 174, 0.35), transparent 60%),
          radial-gradient(400px 200px at 80% 100%, rgba(255, 193, 94, 0.3), transparent 60%);
        pointer-events: none;
      }
      .karaoke-text {
        position: relative;
        font-size: clamp(1.3rem, 3.4vw, 2rem);
        font-weight: 800;
        line-height: 1.7;
        text-align: center;
        letter-spacing: -0.01em;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      }
      .kw {
        display: inline-block;
        padding: 2px 6px;
        margin: 0 1px;
        border-radius: 8px;
        transition: color 0.15s ease, background 0.2s ease, transform 0.2s ease, text-shadow 0.2s ease;
        color: rgba(255, 255, 255, 0.45);
      }
      .kw.sung { color: rgba(255, 255, 255, 0.85); }
      .kw.now {
        color: #001858;
        background: linear-gradient(135deg, #ffd166, #ffc15e);
        transform: scale(1.18);
        text-shadow: none;
        box-shadow: 0 6px 18px -6px rgba(255, 193, 94, 0.8);
      }
      .karaoke-emoji {
        position: relative;
        font-size: clamp(2.4rem, 7vw, 4rem);
        text-align: center;
        margin-bottom: 10px;
        transition: transform 0.4s ease;
      }
      .karaoke-emoji.bounce { animation: kbounce 0.6s ease; }
      @keyframes kbounce {
        0%, 100% { transform: scale(1); }
        40% { transform: scale(1.18) rotate(-4deg); }
        70% { transform: scale(0.96) rotate(2deg); }
      }
      .karaoke-line-num {
        position: relative;
        text-align: center;
        opacity: 0.7;
        font-weight: 700;
        margin-top: 10px;
        font-size: 0.9rem;
        letter-spacing: 0.1em;
      }
      .equalizer {
        display: flex; gap: 4px; justify-content: center;
        height: 24px; align-items: flex-end; margin-top: 14px;
      }
      .equalizer span {
        width: 5px; background: linear-gradient(180deg, #f582ae, #ffc15e);
        border-radius: 3px; height: 6px;
        animation: eq 0.9s ease-in-out infinite;
      }
      .equalizer span:nth-child(2) { animation-delay: 0.1s; }
      .equalizer span:nth-child(3) { animation-delay: 0.2s; }
      .equalizer span:nth-child(4) { animation-delay: 0.3s; }
      .equalizer span:nth-child(5) { animation-delay: 0.15s; }
      .equalizer span:nth-child(6) { animation-delay: 0.05s; }
      .equalizer.paused span { animation-play-state: paused; height: 6px; }
      @keyframes eq {
        0%, 100% { height: 6px; }
        50% { height: 22px; }
      }
      .karaoke-progress {
        position: relative;
        height: 6px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        overflow: hidden;
        margin-top: 18px;
      }
      .karaoke-progress > div {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #f582ae, #ffc15e);
        transition: width 0.25s linear;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <h1>🌊 Sue &amp; Shirley</h1>
          <p>Aprende, practica y recita la historia paso a paso</p>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <button id="voice-btn" class="mini-mute" aria-label="Elegir voz">🗣️ Voz</button>
          <div class="stars" id="stars" aria-label="Progreso">
            <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
          </div>
        </div>
      </header>
      <div id="voice-panel" style="display:none;margin-bottom:18px"></div>

      <nav class="tabs" role="tablist">
        <button data-tab="story" class="active"><span class="ico">📖</span>Historia</button>
        <button data-tab="listen"><span class="ico">🎧</span>Escucha</button>
        <button data-tab="repeat"><span class="ico">🎤</span>Repite</button>
        <button data-tab="blanks"><span class="ico">✏️</span>Huecos</button>
        <button data-tab="recite"><span class="ico">🌟</span>Recita</button>
        <button data-tab="karaoke"><span class="ico">🎵</span>Karaoke</button>
      </nav>

      <section id="panel" class="panel" aria-live="polite"></section>
    </div>

          a._onStopped = () => finish("stopped");
          a.addEventListener("ended", () => finish("ended"));
          a.addEventListener("error", () => { console.warn("audio error for", url, a.error); finish("error"); });
          const p = a.play();
          if (p && typeof p.catch === "function") {
            p.catch((err) => { console.warn("audio play() rejected for", url, err); finish("error"); });
          }
        });

      function stopAudio() {
        if (_currentAudio) {
          try { _currentAudio.pause(); _currentAudio.currentTime = 0; } catch (e) {}
          if (typeof _currentAudio._onStopped === "function") _currentAudio._onStopped();
          _currentAudio = null;
        }
        if (synth) synth.cancel();

      // High-level: speak a line. Uses pre-recorded MP3 by default; falls back to TTS on error.
      function speakLine(idx, opts = {}) {
        const line = LINES[idx];
        if (voiceState.mode === "recorded" && line.audio) {
          return playAudioFile(line.audio, opts).then(result => {
            if (result === "error") return speakTTS(line.text, opts);
          });
        }
        return speakTTS(line.text, opts);
      }
      function speakFull(opts = {}) {
        if (voiceState.mode === "recorded") {
          return playAudioFile(FULL_AUDIO, opts).then(result => {
            if (result === "error") return speakTTS(FULL_TEXT, opts);
          });
        }
        return speakTTS(FULL_TEXT, opts);
      }

      function speak(text, opts = {}) { return speakTTS(text, opts); }

      // Friendly, accurate SR error messages. The Web Speech API on Windows fires
      // `no-speech` very eagerly (silence-detection timeout is short), which is NOT

      function srErrorMessage(err) {
        switch (err) {
          case "not-allowed":
          case "service-not-allowed":
            return "🔒 Permiso de micrófono denegado. Haz clic en el icono de candado o cámara en la barra de direcciones del navegador y permite el micrófono.";

      // Utility: tokenize + sequential alignment for pronunciation feedback.
      // Why sequential (not set-based): the recital is in order, and many words repeat
      // (Sue, Shirley, the, and, shoe, shell, pearl). A set match would mark a word at
      // the END of the text the moment the speaker says it at the START.
      const NUM_WORDS = ["zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty"];
      // Common homophone / SR-mistake equivalents for words in this text.
      // The recognizer often picks the wrong homophone (sea↔see, shore↔sure) or a
      // close-sounding alternative (shoe↔shoo, shirley↔surely). Map them to a canonical form.
      const HOMOPHONES = {
        "see": "sea", "sea": "sea",
        "shore": "shore", "sure": "shore",
        "shoe": "shoe", "shoo": "shoe", "show": "shoe",
        "shirley": "shirley", "surely": "shirley",
        "sue": "sue", "soo": "sue",
        "wash": "wash", "watch": "wash",
        "pearl": "pearl", "purl": "pearl",
        "jewelry": "jewelry", "jewellery": "jewelry", "jewry": "jewelry",
      };
      function canonical(tok) {
        // "6:00" → "six" (recognizer often formats spoken numbers as times)
        const m = tok.match(/^(\d{1,2}):(\d{2})$/);
        if (m) {
          const h = parseInt(m[1], 10);
          if (h >= 0 && h <= 20) return NUM_WORDS[h];
        }
        tok = tok.replace(/[:'"]/g, "");
        if (/^\d+$/.test(tok)) {
          const n = parseInt(tok, 10);
          if (n >= 0 && n <= 20) return NUM_WORDS[n];
        }
        if (HOMOPHONES[tok]) return HOMOPHONES[tok];
        return tok;
      }
      function tokens(s) {
        return s.toLowerCase()
          .replace(/[.,!?;"]/g, " ") // keep ":" so "6:00" parses as a time
          .split(/\s+/)
          .filter(Boolean)
          .map(canonical);
      }
      function alignWords(heard, target) {
        const a = tokens(heard);
        const b = tokens(target);
        const matched = new Array(b.length).fill(false);
        const LOOKAHEAD = 4; // tolerate small skips/misrecognitions
        let hi = 0;          // pointer into heard
        let frontier = -1;   // highest target idx we've matched so far
        for (let ti = 0; ti < b.length; ti++) {
          if (hi >= a.length) break; // user hasn't reached this far yet
          const want = b[ti];
          let found = -1;
          for (let k = hi; k < Math.min(a.length, hi + LOOKAHEAD); k++) {
            if (a[k] === want) { found = k; break; }
          }
          if (found >= 0) {
            matched[ti] = true;
            hi = found + 1;
            frontier = ti;
          }
          // unmatched targets stay false; we keep scanning forward
        }
        const hits = matched.filter(Boolean).length;
        return { matched, hits, total: b.length, pct: b.length ? hits / b.length : 0, frontier };
      }
      function scoreMatch(heard, target) { return alignWords(heard, target); }
      function renderMatch(heard, target) {
        const r = alignWords(heard, target);
        let wordIdx = 0;
        return target.split(/(\s+)/).map(tok => {
          const clean = tok.toLowerCase().replace(/[^a-z']/g, "");
          if (!clean) return tok;
          const i = wordIdx++;
          if (i > r.frontier + 1) return `<span class="word">${tok}</span>`; // neutral — not yet reached
          if (i === r.frontier + 1) return `<span class="word current">${tok}</span>`; // next expected
          return `<span class="word ${r.matched[i] ? "matched" : "missed"}">${tok}</span>`;
        }).join("");
      }

            for (let i = e.resultIndex; i < e.results.length; i++) {
              const t = e.results[i][0].transcript;
              if (e.results[i].isFinal) heardText += " " + t;
              else interim += t;
            }
            const live = (heardText + " " + interim).trim();
            const score = scoreMatch(live, FULL_TEXT);
            sb.style.width = Math.round(score.pct * 100) + "%";
            rt.innerHTML = renderMatch(live, FULL_TEXT);
          };
        }
      }

      // --- KARAOKE tab ---
      function renderKaraoke() {
        // Build word list across lines, keeping line index for emoji bounce.
        const items = []; // { word, lineIdx, isWord }
        LINES.forEach((line, li) => {
          const parts = line.text.split(/(\s+)/);
          parts.forEach(tok => {
            if (!tok) return;
            if (/^\s+$/.test(tok)) items.push({ token: " ", lineIdx: li, isWord: false });
            else items.push({ token: tok, lineIdx: li, isWord: true });
          });
          if (li < LINES.length - 1) items.push({ token: " ", lineIdx: li, isWord: false });
        });
        const wordIdxs = items.map((it, i) => it.isWord ? i : -1).filter(i => i >= 0);

        panel.innerHTML = `
          <h2>🎵 Modo Karaoke</h2>
          <p class="lede">La frase suena, las palabras se iluminan al ritmo. Canta junto con Sue y Shirley 🎤✨</p>
          <div class="row slider-row">
            <label for="krate">Velocidad:</label>
            <input id="krate" type="range" min="0.6" max="1.1" step="0.05" value="0.85" />
            <span id="krate-val" class="pill">0.85x</span>
          </div>
          <div class="karaoke-stage">
            <div class="karaoke-emoji" id="kemoji">${LINES[0].emoji}</div>
            <div class="karaoke-text" id="ktext">
              ${items.map((it, i) => it.isWord
                ? `<span class="kw" data-i="${i}" data-line="${it.lineIdx}">${it.token}</span>`
                : it.token).join("")}
            </div>
            <div class="karaoke-line-num" id="klinenum">LÍNEA 1 / ${LINES.length}</div>
            <div class="equalizer paused" id="keq">
              <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="karaoke-progress"><div id="kprog"></div></div>
          </div>
          <div class="controls">
            <button id="kplay" class="btn primary">▶️ Empezar karaoke</button>
            <button id="kstop" class="btn ghost">⏹ Parar</button>
          </div>
          <div class="tip">Canta en voz alta siguiendo la palabra dorada. Empieza despacio (0.7x) y sube cuando te lo sepas mejor.</div>
        `;

        const krate = document.getElementById("krate");
        const krateVal = document.getElementById("krate-val");
        krate.oninput = () => krateVal.textContent = parseFloat(krate.value).toFixed(2) + "x";

        const ktext = document.getElementById("ktext");
        const kemoji = document.getElementById("kemoji");
        const klinenum = document.getElementById("klinenum");
        const keq = document.getElementById("keq");
        const kprog = document.getElementById("kprog");

        let activeTimers = [];
        function clearTimers() { activeTimers.forEach(t => clearTimeout(t)); activeTimers = []; }
        function reset() {
          ktext.querySelectorAll(".kw").forEach(el => el.classList.remove("now", "sung"));
          kprog.style.width = "0%";
          keq.classList.add("paused");
          klinenum.textContent = `LÍNEA 1 / ${LINES.length}`;
          kemoji.textContent = LINES[0].emoji;
        }
        function highlightWord(idx, totalWords, wordsDone) {
          ktext.querySelectorAll(".kw.now").forEach(el => { el.classList.remove("now"); el.classList.add("sung"); });
          const el = ktext.querySelector(`.kw[data-i="${idx}"]`);
          if (!el) return;
          el.classList.add("now");
          el.scrollIntoView({ behavior: "smooth", block: "center" });
          const lineIdx = +el.dataset.line;
          if (LINES[lineIdx] && kemoji.textContent !== LINES[lineIdx].emoji) {
            kemoji.textContent = LINES[lineIdx].emoji;
            kemoji.classList.remove("bounce");
            void kemoji.offsetWidth;
            kemoji.classList.add("bounce");
            klinenum.textContent = `LÍNEA ${lineIdx + 1} / ${LINES.length}`;
          }
          kprog.style.width = Math.min(100, (wordsDone / totalWords) * 100) + "%";
        }

        // Schedule timed word highlights weighted by character count, distributed across `totalSecs`.
        function scheduleHighlights(totalSecs, startOffsetMs = 0) {
          const totalWeight = wordIdxs.reduce((acc, wi) => acc + items[wi].token.length + 1, 0);
          let elapsed = 0;
          let done = 0;
          wordIdxs.forEach(wi => {
            const w = items[wi].token;
            const weight = w.length + 1;
            const dur = (weight / totalWeight) * totalSecs;
            activeTimers.push(setTimeout(() => {
              done++;
              highlightWord(wi, wordIdxs.length, done);
            }, startOffsetMs + elapsed * 1000));
            elapsed += dur;
          });
          activeTimers.push(setTimeout(() => {
            ktext.querySelectorAll(".kw.now").forEach(el => { el.classList.remove("now"); el.classList.add("sung"); });
            kprog.style.width = "100%";
            keq.classList.add("paused");
          }, startOffsetMs + totalSecs * 1000 + 150));
        }

        async function play() {
          clearTimers();
          reset();
          keq.classList.remove("paused");
          const rate = parseFloat(krate.value);

          // Preferred path: pre-recorded audio file. We get exact duration from the file
          // and distribute word highlights proportionally — sounds natural and stays in sync.
          if (voiceState.mode === "recorded") {
            stopAudio();
            const a = new Audio(FULL_AUDIO);
            a.playbackRate = rate;
            try { a.preservesPitch = true; } catch (e) {}
            try { a.mozPreservesPitch = true; } catch (e) {}
            _currentAudio = a;
            const useDuration = (secs) => {
              clearTimers();
              const startDelay = 30; // small delay so first word fires after audio actually starts
              scheduleHighlights(secs / rate, startDelay);
            };
            a.addEventListener("loadedmetadata", () => {
              if (isFinite(a.duration) && a.duration > 0) useDuration(a.duration);
            });
            a.addEventListener("ended", () => {
              ktext.querySelectorAll(".kw.now").forEach(el => { el.classList.remove("now"); el.classList.add("sung"); });
              kprog.style.width = "100%";
              keq.classList.add("paused");
            });
            a.addEventListener("error", () => {
              // Fallback to TTS path with boundary events
              ttsKaraoke(rate);
            });
            try {
              await a.play();
            } catch (e) {
              ttsKaraoke(rate);
            }
            return;
          }

          // TTS path (browser voice).
          ttsKaraoke(rate);
        }

        function ttsKaraoke(rate) {
          stopAudio();
          const u = new SpeechSynthesisUtterance(FULL_TEXT);
          const v = bestVoice();
          if (v) u.voice = v;
          u.lang = (v && v.lang) || "en-US";
          u.rate = rate;
          u.pitch = 1.05;

          const charPositions = [];
          {
            let pos = 0;
            items.forEach((it, i) => {
              charPositions.push({ start: pos, end: pos + it.token.length, i });
              pos += it.token.length;
            });
          }
          let usedBoundary = false;
          let wordsDoneByBoundary = 0;
          u.onboundary = (e) => {
            if (e.name && e.name !== "word") return;
            usedBoundary = true;
            const ci = e.charIndex;
            const hit = charPositions.find(p => ci >= p.start && ci < p.end && items[p.i].isWord);
            if (hit) {
              wordsDoneByBoundary++;
              highlightWord(hit.i, wordIdxs.length, wordsDoneByBoundary);
            }
          };
          u.onend = () => {
            ktext.querySelectorAll(".kw.now").forEach(el => { el.classList.remove("now"); el.classList.add("sung"); });
            kprog.style.width = "100%";
            keq.classList.add("paused");
            clearTimers();
          };
          u.onerror = u.onend;
          synth.speak(u);

          activeTimers.push(setTimeout(() => {
            if (usedBoundary) return;
            const totalChars = FULL_TEXT.length;
            const baseSecsPerChar = 0.06;
            const totalSecs = (totalChars * baseSecsPerChar) / rate;
            scheduleHighlights(totalSecs);
          }, 600));
        }

        function stop() {
          stopAudio();
          clearTimers();
          reset();
        }

        document.getElementById("kplay").onclick = play;
        document.getElementById("kstop").onclick = stop;
      }

      // ----- Voice picker UI -----
      function renderVoicePanel() {
        const wrap = document.getElementById("voice-panel");
        if (!wrap) return;
        loadVoices();
        const sortedVoices = [...voices].sort((a, b) => rankVoice(b) - rankVoice(a));
        wrap.innerHTML = `
          <div class="panel" style="padding:18px">
            <h2 style="font-size:1.1rem;margin-bottom:6px">🗣️ Elige la voz</h2>
            <p class="lede" style="margin-bottom:12px">La voz pre-grabada es de un hablante nativo (Samantha de macOS) y suena más natural. Si prefieres usar una voz del navegador, elígela abajo.</p>
            <div class="row">
              <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-weight:700">
                <input type="radio" name="voice-mode" value="recorded" ${voiceState.mode === "recorded" ? "checked" : ""}>
                🎙️ Voz pre-grabada (Samantha)
              </label>
              <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-weight:700">
                <input type="radio" name="voice-mode" value="tts" ${voiceState.mode === "tts" ? "checked" : ""}>
                🌐 Voz del navegador
              </label>
            </div>
            <div class="row" style="margin-top:10px">
              <label style="font-weight:700">Voz del navegador:</label>
              <select id="voice-select" style="font-family:inherit;font-size:.95rem;padding:8px 10px;border-radius:10px;border:2px solid #ffe1c2;background:#fff;font-weight:700;max-width:100%">
                ${sortedVoices.length === 0
                  ? `<option value="">(ninguna voz disponible)</option>`
                  : sortedVoices.map(v => {
                      const tag = rankVoice(v) >= 100 ? " ⭐" : (v.localService === false ? " 🌐" : "");
                      return `<option value="${v.voiceURI || v.name}" ${v.voiceURI === voiceState.ttsVoice || v.name === voiceState.ttsVoice ? "selected" : ""}>${v.name} (${v.lang})${tag}</option>`;
                    }).join("")}
              </select>
              <button id="voice-test" class="btn ghost">▶️ Probar</button>
            </div>
            <details style="margin-top:14px">
              <summary>💎 Cómo conseguir voces aún más naturales</summary>
              <ul>
                <li><b>macOS:</b> Ajustes → Accesibilidad → Contenido hablado → Voz del sistema → "Gestionar voces". Descarga las que ponen <i>"(Premium)"</i> como <b>Ava (Premium)</b>, <b>Allison (Premium)</b> o <b>Samantha (Premium)</b>. Suenan casi humanas. Pesan ~500 MB cada una pero son gratis.</li>
                <li><b>Microsoft Edge:</b> ya viene con voces neuronales (Aria, Jenny, Guy). Si abres esta app en Edge y eliges "Voz del navegador", aparecerán automáticamente.</li>
                <li><b>iPhone/iPad:</b> Ajustes → Accesibilidad → Contenido hablado → Voces → Inglés → toca el icono de descarga junto a las voces "Mejorada" o "Premium".</li>
              </ul>
            </details>
          </div>
        `;
        wrap.querySelectorAll('input[name="voice-mode"]').forEach(r => {
          r.onchange = () => { voiceState.mode = r.value; saveVoiceState(); };
        });
        const sel = document.getElementById("voice-select");
        if (sel) sel.onchange = () => { voiceState.ttsVoice = sel.value; saveVoiceState(); };
        document.getElementById("voice-test").onclick = () => {
          const sample = "Sue likes swimming in the sea with her sister Shirley.";
          if (voiceState.mode === "recorded") speakLine(0, { rate: 1 });
          else speakTTS(sample, { rate: 0.95 });
        };
      }
      document.getElementById("voice-btn").onclick = () => {
        const wrap = document.getElementById("voice-panel");
        if (wrap.style.display === "none") {
          wrap.style.display = "block";
          renderVoicePanel();
        } else {
          wrap.style.display = "none";
          stopAudio();
        }
      };

      // ----- Init -----
      renderStars();
      render("story");
    </script>
  </body>
</html>
